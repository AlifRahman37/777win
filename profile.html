<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | 777win</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>body { background-color: #f0f2f5; font-family: 'Roboto', sans-serif; }</style>
</head>
<body class="pb-20">
    <header class="bg-white p-4 flex items-center border-b sticky top-0 z-50">
        <a href="index.html" class="text-gray-600 mr-4"><i class="fa-solid fa-arrow-left"></i></a>
        <h1 class="text-lg font-black text-green-600 italic">MY ACCOUNT</h1>
    </header>

    <div class="p-4">
        <div class="bg-green-600 rounded-3xl p-6 text-white shadow-xl mb-6">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center text-3xl"><i class="fa-solid fa-user"></i></div>
                <div>
                    <h2 class="text-xl font-bold italic uppercase">Alif Rahman</h2>
                    <span class="text-[10px] font-black bg-yellow-400 text-black px-2 py-0.5 rounded-full uppercase">VIP Member</span>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4 mt-8 pt-6 border-t border-white/10">
                <div>
                    <p class="text-[10px] font-black uppercase opacity-60">Main Balance</p>
                    <h3 class="text-2xl font-black italic">৳ 10,250.00</h3>
                </div>
                <div class="text-right">
                    <p class="text-[10px] font-black uppercase opacity-60">Withdraw Status</p>
                    <h3 class="text-xs font-black uppercase mt-2">Active</h3>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-3xl overflow-hidden shadow-sm space-y-1">
            <a href="wallet.html" class="flex items-center justify-between p-5 hover:bg-gray-50 border-b">
                <div class="flex items-center gap-4"><i class="fa-solid fa-wallet text-green-500"></i><span class="text-sm font-black uppercase">My Wallet</span></div>
                <i class="fa-solid fa-chevron-right text-gray-300"></i>
            </a>
            <a href="deposit.html" class="flex items-center justify-between p-5 hover:bg-gray-50 border-b">
                <div class="flex items-center gap-4"><i class="fa-solid fa-money-bill-transfer text-blue-500"></i><span class="text-sm font-black uppercase">Transactions</span></div>
                <i class="fa-solid fa-chevron-right text-gray-300"></i>
            </a>
            <a href="#" class="flex items-center justify-between p-5 hover:bg-gray-50 border-b text-red-500">
                <div class="flex items-center gap-4"><i class="fa-solid fa-power-off"></i><span class="text-sm font-black uppercase">Logout</span></div>
            </a>
        </div>
    </div>
</body>
</html>
