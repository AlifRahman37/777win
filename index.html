<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Betting Light Theme</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .tab-active { border-bottom: 3px solid #10b981; color: #10b981; }
    </style>
</head>
<body>

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="flex items-center justify-between px-4 py-3">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-bars text-xl text-gray-700"></i>
                <h1 class="text-2xl font-black text-green-600 tracking-tighter">BAJIFAIR</h1>
            </div>
            <div class="flex gap-2">
                <button class="px-4 py-1.5 border border-green-600 text-green-600 rounded-md font-medium">Sign up</button>
                <button class="px-4 py-1.5 bg-green-600 text-white rounded-md font-medium">Login</button>
            </div>
        </div>
    </header>

    <div class="m-4 rounded-xl overflow-hidden shadow-lg bg-gradient-to-r from-blue-500 to-purple-600 h-40 flex items-center justify-center text-white relative">
        <div class="text-center">
            <h2 class="text-2xl font-bold italic">BIG PUNCH</h2>
            <p class="text-yellow-300 font-bold text-xl uppercase">Big Prize</p>
        </div>
        <div class="absolute bottom-2 flex gap-1">
            <span class="w-2 h-2 bg-white rounded-full"></span>
            <span class="w-4 h-2 bg-yellow-400 rounded-full"></span>
            <span class="w-2 h-2 bg-white/50 rounded-full"></span>
        </div>
    </div>

    <div class="flex overflow-x-auto bg-white border-b sticky top-[60px] z-40 no-scrollbar">
        <div class="flex min-w-max px-2">
            <button class="flex flex-col items-center p-3 text-green-600 border-b-2 border-green-600">
                <i class="fa-solid fa-trophy text-xl"></i>
                <span class="text-[10px] font-bold mt-1">All</span>
            </button>
            <button class="flex flex-col items-center p-3 text-gray-500">
                <i class="fa-solid fa-baseball-bat-ball text-xl"></i>
                <span class="text-[10px] font-bold mt-1">Cricket</span>
            </button>
            <button class="flex flex-col items-center p-3 text-gray-500">
                <i class="fa-solid fa-futbol text-xl"></i>
                <span class="text-[10px] font-bold mt-1">Soccer</span>
            </button>
            <button class="flex flex-col items-center p-3 text-gray-500">
                <i class="fa-solid fa-table-tennis-paddle-ball text-xl"></i>
                <span class="text-[10px] font-bold mt-1">Tennis</span>
            </button>
            <button class="flex flex-col items-center p-3 text-gray-500">
                <i class="fa-solid fa-users text-xl"></i>
                <span class="text-[10px] font-bold mt-1">Referral</span>
            </button>
        </div>
    </div>

    <main class="p-4">
        <div class="bg-white rounded-lg shadow-sm overflow-hidden">
            <div class="bg-yellow-50 px-4 py-2 border-l-4 border-yellow-400 flex justify-between items-center">
                <h3 class="font-bold text-gray-800">Indian Premier League</h3>
                <i class="fa-solid fa-chevron-right text-xs text-gray-400"></i>
            </div>

            <div class="grid grid-cols-12 bg-gray-100 text-[10px] font-bold text-gray-500 py-1 px-2 border-b">
                <div class="col-span-6 italic">Matched: 1,292,196.19</div>
                <div class="col-span-3 text-center">Back</div>
                <div class="col-span-3 text-center">Lay</div>
            </div>

            <div class="divide-y divide-gray-100">
                <div class="grid grid-cols-12 items-center p-2">
                    <div class="col-span-6 font-semibold text-gray-700">Mumbai Indians</div>
                    <div class="col-span-3 px-1">
                        <button class="w-full bg-blue-100 hover:bg-blue-200 py-1 rounded text-blue-800 font-bold text-sm">6.4</button>
                    </div>
                    <div class="col-span-3 px-1">
                        <button class="w-full bg-pink-100 hover:bg-pink-200 py-1 rounded text-pink-800 font-bold text-sm">6.6</button>
                    </div>
                </div>
                <div class="grid grid-cols-12 items-center p-2">
                    <div class="col-span-6 font-semibold text-gray-700">Chennai Super Kings</div>
                    <div class="col-span-3 px-1">
                        <button class="w-full bg-blue-100 py-1 rounded text-blue-800 font-bold text-sm">2.4</button>
                    </div>
                    <div class="col-span-3 px-1">
                        <button class="w-full bg-pink-100 py-1 rounded text-pink-800 font-bold text-sm">2.6</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="fixed bottom-20 right-4 flex flex-col gap-3">
        <button class="bg-white p-3 rounded-full shadow-lg border text-red-500 animate-bounce">
            <i class="fa-solid fa-gamepad text-xl"></i>
        </button>
        <button class="bg-green-500 p-3 rounded-full shadow-lg text-white">
            <i class="fa-solid fa-comment-dots text-xl"></i>
        </button>
    </div>

    <footer class="bg-white mt-10 p-6 border-t">
        <p class="text-xs font-bold text-gray-400 mb-4 uppercase">Payment Methods</p>
        <div class="grid grid-cols-4 gap-4 opacity-70">
            <div class="bg-gray-100 h-8 rounded flex items-center justify-center font-bold text-[10px]">BKASH</div>
            <div class="bg-gray-100 h-8 rounded flex items-center justify-center font-bold text-[10px]">NAGAD</div>
            <div class="bg-gray-100 h-8 rounded flex items-center justify-center font-bold text-[10px]">ROCKET</div>
            <div class="bg-gray-100 h-8 rounded flex items-center justify-center font-bold text-[10px]">UPAY</div>
        </div>
        <div class="mt-8 text-center text-[10px] text-gray-400">
            <div class="flex justify-center gap-4 mb-4 font-bold">
                <a href="#">About Us</a>
                <a href="#">Privacy Policy</a>
                <a href="#">FAQ</a>
            </div>
            <p>© 2026 BAJIFAIR. All Rights Reserved.</p>
        </div>
    </footer>

</body>
</html>
