<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAJIFAIR | Professional Sports Exchange</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* Exact Colors from your screenshots */
        :root {
            --primary-dark: #122d2d;      /* Background from */
            --header-dark: #0f2424;       /* Header area */
            --bet-bg: #1a3d3d;           /* Table row background */
            --accent-yellow: #f7bc15;    /* League title bar */
            --back-blue: #72bbef;        /* Back button */
            --lay-pink: #f4a5c0;         /* Lay button */
            --text-gold: #ffcc00;
        }

        body {
            background-color: var(--primary-dark);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding-bottom: 70px; /* Space for bottom nav */
        }

        /* Header Style */
        .main-header {
            background-color: var(--header-dark);
            border-bottom: 1px solid #1e4646;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
        }

        /* Banner Slider */
        .banner-container {
            width: 100%;
            height: 180px;
            overflow: hidden;
            position: relative;
        }
        .banner-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Horizontal Menu */
        .category-menu {
            display: flex;
            overflow-x: auto;
            background-color: #1a3d3d;
            padding: 10px 0;
            gap: 5px;
        }
        .menu-item {
            min-width: 75px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 11px;
            color: #9ababa;
        }
        .menu-item.active {
            color: var(--accent-yellow);
        }
        .menu-icon {
            width: 45px;
            height: 45px;
            background: #0f2424;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 5px;
            font-size: 20px;
            border: 1px solid #2a5555;
        }
        .menu-item.active .menu-icon {
            background: var(--accent-yellow);
            color: black;
        }

        /* Betting Table */
        .league-title {
            background-color: var(--accent-yellow);
            color: black;
            font-weight: 800;
            padding: 8px 12px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-transform: uppercase;
        }

        .match-card {
            background-color: var(--bet-bg);
            margin-bottom: 2px;
            padding: 10px;
        }

        .bet-button {
            width: 65px;
            height: 45px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
            color: #122d2d;
        }
        .back { background-color: var(--back-blue); }
        .lay { background-color: var(--lay-pink); }
        .odds-val { font-size: 14px; font-weight: 800; }
        .matched-vol { font-size: 9px; opacity: 0.8; }

        /* Casino Section */
        .casino-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 10px;
        }
        .casino-item {
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #2a5555;
            background: #0f2424;
        }
        .casino-img {
            width: 100%;
            height: 100px;
            object-fit: cover;
        }
        .casino-label {
            padding: 5px;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: #0f2424;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #1e4646;
        }

        /* Floating Buttons */
        .floating-action {
            position: fixed;
            right: 15px;
            bottom: 80px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .f-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* Payment Icons */
        .payment-footer {
            background-color: #163636;
            padding: 15px;
            margin-top: 20px;
        }
        .payment-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-bars text-xl text-yellow-500"></i>
            <span class="text-2xl font-black italic tracking-tighter">BAJIFAIR</span>
        </div>
        <div class="flex gap-2">
            <button class="bg-gray-600 px-4 py-1.5 rounded text-sm font-bold">Sign up</button>
            <button class="bg-green-600 px-4 py-1.5 rounded text-sm font-bold">Login</button>
        </div>
    </header>

    <div class="banner-container">
        <img src="https://via.placeholder.com/600x200/ff5733/ffffff?text=BIG+PUNCH+BIG+PRIZE" class="banner-img" alt="Promo">
        <div class="absolute bottom-2 left-1/2 -translate-x-1/2 flex gap-1">
            <span class="w-2 h-2 rounded-full bg-gray-400"></span>
            <span class="w-6 h-2 rounded-full bg-yellow-500"></span>
            <span class="w-2 h-2 rounded-full bg-gray-400"></span>
        </div>
    </div>

    <div class="flex bg-[#1a3d3d] border-b border-[#2a5555] overflow-x-auto no-scrollbar">
        <button class="px-6 py-3 text-sm font-bold border-b-2 border-yellow-500 text-yellow-500">Live</button>
        <button class="px-6 py-3 text-sm font-bold text-gray-400">Upcoming</button>
        <button class="px-6 py-3 text-sm font-bold text-gray-400">Leagues</button>
        <button class="px-6 py-3 text-sm font-bold text-gray-400">Parlay</button>
    </div>

    <div class="category-menu no-scrollbar">
        <div class="menu-item">
            <div class="menu-icon"><i class="fa-solid fa-clover text-pink-500"></i></div>
            <span>Casino</span>
        </div>
        <div class="menu-item active">
            <div class="menu-icon"><i class="fa-solid fa-trophy"></i></div>
            <span>All</span>
        </div>
        <div class="menu-item">
            <div class="menu-icon"><i class="fa-solid fa-baseball-bat-ball"></i></div>
            <span>Cricket</span>
        </div>
        <div class="menu-item">
            <div class="menu-icon"><i class="fa-solid fa-futbol"></i></div>
            <span>Soccer</span>
        </div>
        <div class="menu-item">
            <div class="menu-icon"><i class="fa-solid fa-table-tennis-paddle-ball"></i></div>
            <span>Tennis</span>
        </div>
    </div>

    <div class="mt-2">
        <div class="league-title">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-baseball"></i>
                <span>Indian Premier League</span>
            </div>
            <i class="fa-solid fa-chevron-down"></i>
        </div>

        <div class="match-card border-b border-[#2a5555]">
            <div class="flex justify-between items-center mb-1">
                <div class="text-[10px] text-gray-400">Matched: 1,341,204</div>
                <div class="flex gap-14 pr-4 text-[10px] font-bold text-gray-400">
                    <span>Back</span>
                    <span>Lay</span>
                </div>
            </div>
            <div class="flex justify-between items-center">
                <div class="font-bold text-sm">Mumbai Indians</div>
                <div class="flex gap-1">
                    <div class="bet-button back">
                        <span class="odds-val">9.8</span>
                        <span class="matched-vol">5.42</span>
                    </div>
                    <div class="bet-button lay">
                        <span class="odds-val">10</span>
                        <span class="matched-vol">858.46</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="match-card">
            <div class="flex justify-between items-center">
                <div class="font-bold text-sm">Chennai Super Kings</div>
                <div class="flex gap-1">
                    <div class="bet-button back">
                        <span class="odds-val">3.85</span>
                        <span class="matched-vol">933.85</span>
                    </div>
                    <div class="bet-button lay">
                        <span class="odds-val">3.9</span>
                        <span class="matched-vol">501.2</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="p-3">
        <h3 class="text-sm font-bold border-l-4 border-green-500 pl-2 mb-3">Favourites</h3>
        <div class="grid grid-cols-2 gap-3">
            <div class="casino-item">
                <img src="https://via.placeholder.com/200x120/800000/ffffff?text=AVIATOR" class="casino-img">
                <div class="casino-label">Aviator</div>
            </div>
            <div class="casino-item">
                <img src="https://via.placeholder.com/200x120/4b0082/ffffff?text=CRAZY+TIME" class="casino-img">
                <div class="casino-label">Crazy Time</div>
            </div>
        </div>
    </div>

    <div class="payment-footer">
        <div class="flex justify-between mb-4">
            <div class="text-[10px] font-bold text-gray-400">Gaming License</div>
            <div class="text-[10px] font-bold text-gray-400">Responsible Gaming</div>
        </div>
        <div class="payment-grid">
            <div class="bg-white/10 h-8 rounded flex items-center justify-center text-[8px] font-bold">BKASH</div>
            <div class="bg-white/10 h-8 rounded flex items-center justify-center text-[8px] font-bold">NAGAD</div>
            <div class="bg-white/10 h-8 rounded flex items-center justify-center text-[8px] font-bold">ROCKET</div>
            <div class="bg-white/10 h-8 rounded flex items-center justify-center text-[8px] font-bold">UPAY</div>
        </div>
    </div>

    <div class="floating-action">
        <div class="f-icon"><img src="https://cdn-icons-png.flaticon.com/512/1055/1055823.png" class="w-8"></div>
        <div class="f-icon bg-green-500 text-white text-2xl"><i class="fa-solid fa-comment-dots"></i></div>
    </div>

    <nav class="bottom-nav">
        <div class="flex flex-col items-center text-yellow-500">
            <i class="fa-solid fa-house"></i>
            <span class="text-[10px] mt-1">Home</span>
        </div>
        <div class="flex flex-col items-center text-gray-500">
            <i class="fa-solid fa-bolt"></i>
            <span class="text-[10px] mt-1">In-Play</span>
        </div>
        <div class="flex flex-col items-center text-gray-500">
            <i class="fa-solid fa-wallet"></i>
            <span class="text-[10px] mt-1">Wallet</span>
        </div>
        <div class="flex flex-col items-center text-gray-500">
            <i class="fa-solid fa-user"></i>
            <span class="text-[10px] mt-1">Account</span>
        </div>
    </nav>

</body>
</html>
