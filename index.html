<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARWIN | Next-Gen Betting Platform</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary-green: #2ecc71;
            --soft-white: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --premium-blue: #3b82f6;
            --premium-pink: #f472b6;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
            color: #1e293b;
            min-height: 100vh;
            margin: 0;
        }

        /* Unique Animated Background for Banner */
        .premium-banner {
            background: linear-gradient(-45deg, #6366f1, #a855f7, #2ecc71, #3b82f6);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            position: relative;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .premium-banner::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Glassmorphism Navigation */
        .glass-nav {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Custom Scrollbar for Icon Menu */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Neumorphic Shadow for Cards */
        .neo-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 10px 10px 20px #d1d9e6, -10px -10px 20px #ffffff;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .neo-button {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 4px 4px 8px #d1d9e6, -4px -4px 8px #ffffff;
        }

        .neo-button:active {
            box-shadow: inset 4px 4px 8px #d1d9e6, inset -4px -4px 8px #ffffff;
            transform: scale(0.95);
        }

        /* Floating Animation */
        .float-btn {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Tab Active State */
        .nav-item.active {
            color: var(--primary-green);
        }
        .nav-item.active .icon-container {
            background: #ecfdf5;
            color: var(--primary-green);
            transform: scale(1.1);
        }

        /* Responsive Betting Buttons */
        .btn-bet {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 70px;
            height: 50px;
            border-radius: 12px;
            font-weight: 800;
        }
    </style>
</head>
<body class="pb-24">

    <script>
        // Simple script to handle tab switching visual feel
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(i => {
                    i.classList.remove('active', 'text-green-600');
                    i.classList.add('text-gray-400');
                });
                this.classList.add('active', 'text-green-600');
                this.classList.remove('text-gray-400');
            });
        });

        console.log("AR UI Engine Initialized...");
    </script>
