<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | 777win</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f0f2f5; }
        .glass-header { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #e5e7eb; }
        .input-focus:focus-within { border-color: #00a859; background-color: white; box-shadow: 0 0 0 4px rgba(0, 168, 89, 0.05); }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <header class="glass-header sticky top-0 z-50 px-4 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <a href="index.html" class="text-gray-600"><i class="fa-solid fa-arrow-left text-xl"></i></a>
            <h1 class="text-2xl font-black italic tracking-tighter text-green-600 ml-2">777WIN</h1>
        </div>
        <a href="signup.html" class="text-sm font-bold text-green-600 uppercase">Sign Up</a>
    </header>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-white rounded-[30px] shadow-2xl shadow-green-100/50 p-8">
            <div class="mb-8 text-center">
                <div class="w-16 h-16 bg-green-100 rounded-2xl flex items-center justify-center text-green-600 mx-auto mb-4">
                    <i class="fa-solid fa-shield-halved text-3xl"></i>
                </div>
                <h2 class="text-3xl font-black text-gray-800 italic uppercase">Welcome Back</h2>
                <p class="text-gray-400 text-[10px] font-black mt-1 uppercase tracking-widest leading-loose">Enter your credentials to access your account</p>
            </div>

            <form action="#" method="POST" class="space-y-5">
                <div>
                    <label class="text-[10px] font-black uppercase text-gray-400 ml-1">Phone Number</label>
                    <div class="relative mt-1 group input-focus border-2 border-gray-50 rounded-2xl bg-gray-50 transition-all">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                            <i class="fa-solid fa-phone text-sm"></i>
                        </span>
                        <input type="tel" required class="w-full bg-transparent py-4 pl-12 pr-4 outline-none text-sm font-bold text-gray-700" placeholder="017XXXXXXXX">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center ml-1">
                        <label class="text-[10px] font-black uppercase text-gray-400">Password</label>
                        <a href="#" class="text-[10px] font-black text-green-600 uppercase">Forgot?</a>
                    </div>
                    <div class="relative mt-1 group input-focus border-2 border-gray-50 rounded-2xl bg-gray-50 transition-all">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                            <i class="fa-solid fa-lock text-sm"></i>
                        </span>
                        <input type="password" required class="w-full bg-transparent py-4 pl-12 pr-4 outline-none text-sm font-bold text-gray-700" placeholder="••••••••">
                    </div>
                </div>

                <div class="flex items-center gap-2 px-1">
                    <input type="checkbox" id="remember" class="w-4 h-4 rounded text-green-600 focus:ring-green-500 border-gray-300">
                    <label for="remember" class="text-[11px] text-gray-500 font-bold uppercase tracking-tighter cursor-pointer">Remember device</label>
                </div>

                <button type="submit" class="w-full bg-green-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-green-200 uppercase tracking-widest text-sm hover:bg-green-700 active:scale-[0.98] transition-all mt-4">
                    Login to Account
                </button>
            </form>

            <div class="mt-8 text-center space-y-4">
                <div class="flex items-center gap-4">
                    <div class="h-[1px] bg-gray-100 flex-grow"></div>
                    <span class="text-[10px] font-black text-gray-300 uppercase">Secure Login</span>
                    <div class="h-[1px] bg-gray-100 flex-grow"></div>
                </div>
                <p class="text-[11px] text-gray-400 font-bold uppercase tracking-tighter">
                    Don't have an account? 
                    <a href="signup.html" class="text-green-600 ml-1">Register Now</a>
                </p>
            </div>
        </div>
    </main>

    <footer class="p-6 text-center">
        <div class="flex justify-center gap-4 mb-4 text-gray-300">
            <i class="fa-solid fa-fingerprint text-xl"></i>
            <i class="fa-solid fa-shield-check text-xl"></i>
        </div>
        <p class="text-[9px] text-gray-400 font-bold uppercase tracking-[0.2em]">© 2026 777WIN ENTERTAINMENT.</p>
    </footer>

</body>
</html>
